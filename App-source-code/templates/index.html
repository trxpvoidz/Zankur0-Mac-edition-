<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zankur0</title>
  <style>
    /* ... exactly the same CSS as provided ... */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, 'Segoe UI', 'Roboto', system-ui, sans-serif; }
    body { min-height: 100vh; background: #000000; display: flex; align-items: center; justify-content: center; padding: 20px; color: #ffffff; animation: fadeIn 0.7s ease; }
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes slideUp { 0% { opacity: 0; transform: translateY(16px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes spinGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .app-container { width: 900px; max-width: 100%; background: #000000; border-radius: 32px; border: 1.8px solid #ffffff; padding: 28px 24px; position: relative; overflow: hidden; animation: slideUp 0.8s ease; }
    .app-container::before { content: ''; position: absolute; inset: 0; padding: 2.5px; border-radius: 32px; background: conic-gradient(from 0deg, transparent 0deg, #ffffff 90deg, transparent 180deg, #ffffff 270deg, transparent 360deg); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; animation: spinGlow 6s linear infinite; opacity: 0.45; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; position: relative; z-index: 2; }
    .typewriter-container { display: flex; align-items: center; gap: 8px; }
    .typewriter-text { font-size: 18px; font-weight: 400; letter-spacing: 0.5px; color: #ffffff; border-right: 2px solid #ffffff; padding-right: 8px; white-space: nowrap; overflow: hidden; animation: blinkCursor 0.8s step-end infinite; }
    @keyframes blinkCursor { 0%, 100% { border-color: #ffffff; } 50% { border-color: transparent; } }
    .btn-group { display: flex; gap: 12px; }
    .btn { background: #000000; border: 1.8px solid #ffffff; color: #ffffff; padding: 8px 20px; border-radius: 40px; font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px; position: relative; z-index: 2; }
    .btn:hover { background: #ffffff; color: #000000; transform: scale(1.02); box-shadow: 0 0 18px rgba(255,255,255,0.25); }
    .btn-danger:hover { background: #ff4444; border-color: #ff4444; color: #000; }
    .btn-success:hover { background: #00cc66; border-color: #00cc66; color: #000; }
    .btn:disabled { opacity: 0.35; pointer-events: none; }
    .tab-bar { display: flex; gap: 10px; border-bottom: 1.8px solid #ffffff; margin-bottom: 28px; position: relative; z-index: 2; }
    .tab { padding: 12px 28px; background: transparent; border: 1.8px solid transparent; color: #aaaaaa; font-size: 16px; font-weight: 500; cursor: pointer; border-radius: 40px 40px 0 0; transition: all 0.3s; }
    .tab:hover { color: #ffffff; }
    .tab.active { color: #000000; background: #ffffff; border: 1.8px solid #ffffff; }
    .tab-content { animation: fadeIn 0.5s ease; position: relative; z-index: 2; }
    .dropzone { border: 2px dashed #ffffff; border-radius: 26px; padding: 36px; text-align: center; margin: 20px 0; transition: all 0.3s; cursor: pointer; background: #000000; color: #cccccc; }
    .dropzone.drag-over { border-color: #ffffff; background: #0f0f0f; transform: scale(1.01); }
    .progress-bar { height: 6px; background: #1a1a1a; border-radius: 20px; margin: 20px 0; overflow: hidden; border: 1.5px solid #ffffff; }
    .progress-fill { height: 100%; width: 0%; background: #ffffff; border-radius: 20px; transition: width 0.4s; }
    .log-box { background: #000000; border-radius: 20px; padding: 16px; font-family: monospace; font-size: 13px; color: #dddddd; max-height: 200px; overflow-y: auto; border: 1.8px solid #ffffff; white-space: pre-wrap; }
    .info-banner { background: #000000; border: 1.8px solid #ffffff; padding: 14px 22px; border-radius: 40px; margin-bottom: 24px; }
    .installed-list { background: #000000; border-radius: 20px; padding: 8px; max-height: 400px; overflow-y: auto; border: 1.8px solid #ffffff; }
    .list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid #333; cursor: pointer; }
    .list-item:hover { background: #111; }
    .list-item.selected { background: #222; border-left: 4px solid #fff; }
    .list-thumb { width: 48px; height: 48px; border-radius: 12px; background: #1a1a1a; margin-right: 16px; overflow: hidden; }
    .flex { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .mt-4 { margin-top: 20px; }
    .hidden { display: none !important; }
    select.btn { background: #000000; color: #ffffff; border: 1.8px solid #ffffff; padding: 8px 24px 8px 16px; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'); background-repeat: no-repeat; background-position: right 12px center; background-size: 14px; }
    #oneko { background-image: url('https://raw.githubusercontent.com/trxpvoidz/Oneko-Custom/refs/heads/main/Untitled248_20260330213042_2.gif') !important; }
  </style>
</head>
<body>
  <input type="file" id="folderInput" webkitdirectory style="display:none">
  <input type="file" id="zipFileInput" accept=".zip" style="display:none">

  <div class="app-container">
    <div class="top-bar">
      <div class="typewriter-container">
        <span class="typewriter-text" id="typewriter"></span>
      </div>
      <div class="btn-group">
        <button class="btn" id="muteToggle">🔊 music on</button>
        <button class="btn" id="openOutputFolderBtn">📂 open output</button>
        <button class="btn" id="creditsBtn">credits</button>
      </div>
    </div>
    <div class="info-banner">
      ✦ packs stored in <code>~/Library/Application Support/Zankur0/skin_packs</code>
    </div>
    <div class="tab-bar">
      <button class="tab active" data-tab="porter">porter</button>
      <button class="tab" data-tab="installed">my packs</button>
    </div>

    <!-- Porter Tab -->
    <div id="tab-porter" class="tab-content">
      <h3 style="margin-bottom:20px;">porter — copy · encrypt · download</h3>
      <div class="flex">
        <button class="btn" id="selectPorterFolderBtn">📁 select folder</button>
        <button class="btn" id="clearPorterBtn">🗑️ clear</button>
        <select id="manifestSelect" class="btn" style="margin-left:auto;"></select>
      </div>
      <div class="dropzone" id="porterDropzone">
        drag & drop a skin pack folder here<br>
        <span style="font-size:12px; opacity:0.7;">(or click "select folder")</span>
      </div>
      <div id="porterPreview" class="folder-preview hidden" style="padding:12px; border:1.8px solid #fff; border-radius:40px; margin-top:12px;">
        <span>📦</span>
        <span id="porterFolderName">no folder selected</span>
      </div>
      <div class="progress-bar hidden" id="porterProgressBar">
        <div class="progress-fill" id="porterProgressFill"></div>
      </div>
      <button class="btn" id="runPorterBtn">🔐 run porter</button>
      <div class="log-box mt-4" id="porterLog">ready. select a folder to begin.</div>
    </div>

    <!-- Installed Tab -->
    <div id="tab-installed" class="tab-content hidden">
      <div class="flex" style="margin-bottom:16px;">
        <button class="btn" id="refreshInstalledBtn">🔄 refresh</button>
        <button class="btn btn-danger" id="deleteSelectedBtn">🗑️ delete selected</button>
        <button class="btn btn-danger" id="safeWipeBtn">⚠️ delete all</button>
      </div>
      <div class="dropzone" id="importDropzone" style="padding:20px;">
        📁 click to import ZIP or folder (or drag & drop)
      </div>
      <div class="installed-list" id="installedList"></div>
      <div style="margin-top:16px; text-align:center;" id="previewImage"></div>
    </div>
  </div>

  <audio id="bgMusic" src="/assets/bg-music.mp3" loop autoplay></audio>

  <script>
    // ---------- SVG Replacement Map ----------
    const REPLACEMENT_MAP = [['🍎', '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M447.1 332.7C446.9 296 463.5 268.3 497.1 247.9C478.3 221 449.9 206.2 412.4 203.3C376.9 200.5 338.1 224 323.9 224C308.9 224 274.5 204.3 247.5 204.3C191.7 205.2 132.4 248.8 132.4 337.5C132.4 363.7 137.2 390.8 146.8 418.7C159.6 455.4 205.8 545.4 254 543.9C279.2 543.3 297 526 329.8 526C361.6 526 378.1 543.9 406.2 543.9C454.8 543.2 496.6 461.4 508.8 424.6C443.6 393.9 447.1 334.6 447.1 332.7zM390.5 168.5C417.8 136.1 415.3 106.6 414.5 96C390.4 97.4 362.5 112.4 346.6 130.9C329.1 150.7 318.8 175.2 321 202.8C347.1 204.8 370.9 191.4 390.5 168.5z"/></svg>', '#ffffff']];
    (function() {
      if (!REPLACEMENT_MAP.length) return;
      const baseStyle = document.createElement('style');
      baseStyle.textContent = `.unicode-icon { display: inline-block; width: 1.2em; height: 1.2em; vertical-align: middle; --icon-color: currentColor; } .unicode-icon svg { display: block; width: 100%; height: 100%; }`;
      document.head.appendChild(baseStyle);
      const charDataMap = new Map();
      for (const [char, svgOrUrl, color] of REPLACEMENT_MAP) {
        const isUrl = typeof svgOrUrl === 'string' && (svgOrUrl.startsWith('http') || svgOrUrl.startsWith('/') || svgOrUrl.startsWith('./'));
        charDataMap.set(char, { content: svgOrUrl, isUrl, color: color || 'currentColor' });
      }
      function createIconElement(data) {
        const { content, isUrl, color } = data;
        const wrapper = document.createElement('span');
        wrapper.className = 'unicode-icon';
        wrapper.style.setProperty('--icon-color', color);
        if (isUrl) {
          wrapper.setAttribute('data-svg-url', content);
          wrapper.setAttribute('data-svg-color', color);
          wrapper.textContent = ' ';
          fetch(content).then(r => r.text()).then(svgText => {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = svgText;
            const svg = tempDiv.querySelector('svg');
            if (svg) {
              svg.style.fill = color;
              svg.setAttribute('fill', color);
              svg.querySelectorAll('path, circle, rect, polygon, ellipse').forEach(s => s.setAttribute('fill', color));
              wrapper.innerHTML = '';
              wrapper.appendChild(svg);
            }
          }).catch(()=>{});
        } else {
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = content;
          const svg = tempDiv.querySelector('svg');
          if (svg) {
            svg.style.fill = color;
            svg.setAttribute('fill', color);
            svg.querySelectorAll('path, circle, rect, polygon, ellipse').forEach(s => s.setAttribute('fill', color));
          }
          wrapper.appendChild(tempDiv.firstChild);
        }
        return wrapper;
      }
      function processNode(node) {
        if (node.nodeType === Node.ELEMENT_NODE && /^(SCRIPT|STYLE|TEXTAREA|NOSCRIPT)$/i.test(node.tagName)) return;
        if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent;
          let hasMatch = false;
          for (const char of charDataMap.keys()) if (text.includes(char)) { hasMatch = true; break; }
          if (!hasMatch) return;
          const fragment = document.createDocumentFragment();
          let remaining = text;
          while (remaining.length) {
            let earliest = Infinity, matchedChar = '';
            for (const char of charDataMap.keys()) { const idx = remaining.indexOf(char); if (idx !== -1 && idx < earliest) { earliest = idx; matchedChar = char; } }
            if (earliest === Infinity) { fragment.appendChild(document.createTextNode(remaining)); break; }
            if (earliest > 0) fragment.appendChild(document.createTextNode(remaining.slice(0, earliest)));
            fragment.appendChild(createIconElement(charDataMap.get(matchedChar)));
            remaining = remaining.slice(earliest + matchedChar.length);
          }
          node.parentNode.replaceChild(fragment, node);
          return;
        }
        for (const child of [...node.childNodes]) processNode(child);
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => processNode(document.body));
      else processNode(document.body);
    })();

    // ---------- Oneko Cat ----------
    (function oneko() {
      const isReducedMotion = window.matchMedia(`(prefers-reduced-motion: reduce)`).matches;
      if (isReducedMotion) return;
      const nekoEl = document.createElement('div');
      let persistPosition = true;
      let nekoPosX = 32, nekoPosY = 32, mousePosX = 0, mousePosY = 0, frameCount = 0, idleTime = 0, idleAnimation = null, idleAnimationFrame = 0;
      const nekoSpeed = 10;
      const spriteSets = {
        idle: [[-3, -3]], alert: [[-7, -3]], scratchSelf: [[-5, 0], [-6, 0], [-7, 0]], scratchWallN: [[0, 0], [0, -1]], scratchWallS: [[-7, -1], [-6, -2]], scratchWallE: [[-2, -2], [-2, -3]], scratchWallW: [[-4, 0], [-4, -1]], tired: [[-3, -2]], sleeping: [[-2, 0], [-2, -1]],
        N: [[-1, -2], [-1, -3]], NE: [[0, -2], [0, -3]], E: [[-3, 0], [-3, -1]], SE: [[-5, -1], [-5, -2]], S: [[-6, -3], [-7, -2]], SW: [[-5, -3], [-6, -1]], W: [[-4, -2], [-4, -3]], NW: [[-1, 0], [-1, -1]]
      };
      function init() {
        let nekoFile = './oneko.gif';
        const curScript = document.currentScript;
        if (curScript && curScript.dataset.cat) nekoFile = curScript.dataset.cat;
        if (curScript && curScript.dataset.persistPosition) persistPosition = curScript.dataset.persistPosition === '' ? true : JSON.parse(curScript.dataset.persistPosition.toLowerCase());
        if (persistPosition) {
          let storedNeko = JSON.parse(window.localStorage.getItem('oneko'));
          if (storedNeko !== null) {
            nekoPosX = storedNeko.nekoPosX; nekoPosY = storedNeko.nekoPosY; mousePosX = storedNeko.mousePosX; mousePosY = storedNeko.mousePosY;
            frameCount = storedNeko.frameCount; idleTime = storedNeko.idleTime; idleAnimation = storedNeko.idleAnimation; idleAnimationFrame = storedNeko.idleAnimationFrame;
            nekoEl.style.backgroundPosition = storedNeko.bgPos;
          }
        }
        nekoEl.id = 'oneko'; nekoEl.ariaHidden = true; nekoEl.style.width = '32px'; nekoEl.style.height = '32px'; nekoEl.style.position = 'fixed'; nekoEl.style.pointerEvents = 'none'; nekoEl.style.imageRendering = 'pixelated';
        nekoEl.style.left = `${nekoPosX - 16}px`; nekoEl.style.top = `${nekoPosY - 16}px`; nekoEl.style.zIndex = 2147483647;
        nekoEl.style.backgroundImage = `url(${nekoFile})`;
        document.body.appendChild(nekoEl);
        document.addEventListener('mousemove', e => { mousePosX = e.clientX; mousePosY = e.clientY; });
        if (persistPosition) window.addEventListener('beforeunload', () => window.localStorage.setItem('oneko', JSON.stringify({nekoPosX,nekoPosY,mousePosX,mousePosY,frameCount,idleTime,idleAnimation,idleAnimationFrame,bgPos:nekoEl.style.backgroundPosition})));
        window.requestAnimationFrame(onAnimationFrame);
      }
      let lastFrameTimestamp;
      function onAnimationFrame(timestamp) {
        if (!nekoEl.isConnected) return;
        if (!lastFrameTimestamp) lastFrameTimestamp = timestamp;
        if (timestamp - lastFrameTimestamp > 100) { lastFrameTimestamp = timestamp; frame(); }
        window.requestAnimationFrame(onAnimationFrame);
      }
      function setSprite(name, frame) { const sprite = spriteSets[name][frame % spriteSets[name].length]; nekoEl.style.backgroundPosition = `${sprite[0] * 32}px ${sprite[1] * 32}px`; }
      function resetIdleAnimation() { idleAnimation = null; idleAnimationFrame = 0; }
      function idle() {
        idleTime++;
        if (idleTime > 10 && Math.floor(Math.random() * 200) == 0 && idleAnimation == null) {
          let avalibleIdleAnimations = ['sleeping', 'scratchSelf'];
          if (nekoPosX < 32) avalibleIdleAnimations.push('scratchWallW'); if (nekoPosY < 32) avalibleIdleAnimations.push('scratchWallN');
          if (nekoPosX > window.innerWidth - 32) avalibleIdleAnimations.push('scratchWallE'); if (nekoPosY > window.innerHeight - 32) avalibleIdleAnimations.push('scratchWallS');
          idleAnimation = avalibleIdleAnimations[Math.floor(Math.random() * avalibleIdleAnimations.length)];
        }
        switch (idleAnimation) {
          case 'sleeping': if (idleAnimationFrame < 8) { setSprite('tired', 0); break; } setSprite('sleeping', Math.floor(idleAnimationFrame / 4)); if (idleAnimationFrame > 192) resetIdleAnimation(); break;
          case 'scratchWallN': case 'scratchWallS': case 'scratchWallE': case 'scratchWallW': case 'scratchSelf': setSprite(idleAnimation, idleAnimationFrame); if (idleAnimationFrame > 9) resetIdleAnimation(); break;
          default: setSprite('idle', 0); return;
        }
        idleAnimationFrame++;
      }
      function frame() {
        frameCount++;
        const diffX = nekoPosX - mousePosX, diffY = nekoPosY - mousePosY, distance = Math.sqrt(diffX ** 2 + diffY ** 2);
        if (distance < nekoSpeed || distance < 48) { idle(); return; }
        idleAnimation = null; idleAnimationFrame = 0;
        if (idleTime > 1) { setSprite('alert', 0); idleTime = Math.min(idleTime, 7); idleTime--; return; }
        let direction = ''; direction += diffY / distance > 0.5 ? 'N' : ''; direction += diffY / distance < -0.5 ? 'S' : ''; direction += diffX / distance > 0.5 ? 'W' : ''; direction += diffX / distance < -0.5 ? 'E' : '';
        setSprite(direction, frameCount);
        nekoPosX -= (diffX / distance) * nekoSpeed; nekoPosY -= (diffY / distance) * nekoSpeed;
        nekoPosX = Math.min(Math.max(16, nekoPosX), window.innerWidth - 16); nekoPosY = Math.min(Math.max(16, nekoPosY), window.innerHeight - 16);
        nekoEl.style.left = `${nekoPosX - 16}px`; nekoEl.style.top = `${nekoPosY - 16}px`;
      }
      init();
    })();

    // ---------- Main App Logic (Flask API) ----------
    (function(){
      "use strict";
      const API_BASE = 'http://127.0.0.1:5000';
      let porterFolderPath = null;
      let installedPacks = [];
      let selectedPackUuid = null;

      // Typewriter
      const phrases = ["Drop to Port!", "Just drag, drop, and port!", "Zankuro, The best local skin pack porter for MacOS 🍎"];
      let phraseIndex = 0, charIndex = 0, isDeleting = false;
      const typewriterEl = document.getElementById('typewriter');
      function typeWriter() {
        const currentPhrase = phrases[phraseIndex];
        if (isDeleting) {
          typewriterEl.textContent = currentPhrase.substring(0, charIndex - 1);
          charIndex--;
          if (charIndex === 0) { isDeleting = false; phraseIndex = (phraseIndex + 1) % phrases.length; }
        } else {
          typewriterEl.textContent = currentPhrase.substring(0, charIndex + 1);
          charIndex++;
          if (charIndex === currentPhrase.length) { isDeleting = true; setTimeout(typeWriter, 2000); return; }
        }
        setTimeout(typeWriter, isDeleting ? 50 : 100);
      }
      typeWriter();

      // Music
      let musicEnabled = true;
      const bgMusic = document.getElementById('bgMusic');
      bgMusic.volume = 0.5;
      function toggleMusic() {
        musicEnabled = !musicEnabled;
        if (musicEnabled) { bgMusic.play().catch(()=>{}); document.getElementById('muteToggle').innerHTML = '🔊 music on'; }
        else { bgMusic.pause(); document.getElementById('muteToggle').innerHTML = '🔇 music off'; }
      }
      function enableAutoplay() { if (bgMusic && musicEnabled) bgMusic.play().catch(()=>{}); document.removeEventListener('click', enableAutoplay); document.removeEventListener('keydown', enableAutoplay); }
      document.addEventListener('click', enableAutoplay);
      document.addEventListener('keydown', enableAutoplay);

      // API helpers
      async function apiCall(endpoint, method='GET', body=null, isJson=true) {
        const options = { method };
        if (body) {
          if (isJson) {
            options.headers = { 'Content-Type': 'application/json' };
            options.body = JSON.stringify(body);
          } else {
            options.body = body;
          }
        }
        const res = await fetch(API_BASE + endpoint, options);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        return res;
      }

      function updatePorterPreview(path) {
        const preview = document.getElementById('porterPreview');
        const nameSpan = document.getElementById('porterFolderName');
        if (path) { nameSpan.textContent = path.split(/[\\\/]/).pop(); preview.classList.remove('hidden'); }
        else { preview.classList.add('hidden'); }
      }

      async function refreshInstalled() {
        const res = await apiCall('/api/state');
        const data = await res.json();
        installedPacks = data.known || [];
        const list = document.getElementById('installedList');
        list.innerHTML = '';
        if (installedPacks.length === 0) {
          list.innerHTML = '<div style="padding:20px; text-align:center;">no packs installed</div>';
          return;
        }
        installedPacks.forEach(p => {
          const div = document.createElement('div');
          div.className = 'list-item';
          div.dataset.uuid = p.uuid;
          div.innerHTML = `<span>📦 ${p.store_name}</span><span style="opacity:0.6;">${p.uuid.slice(0,8)}</span>`;
          div.addEventListener('click', () => {
            selectedPackUuid = p.uuid;
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
          });
          list.appendChild(div);
        });
      }

      // File upload helpers
      async function uploadFolderFromFileList(files, folderName) {
        const formData = new FormData();
        for (let file of files) {
          const relPath = file.webkitRelativePath || file.name;
          formData.append('files[]', file, relPath);
        }
        const res = await apiCall('/api/upload-folder', 'POST', formData, false);
        const data = await res.json();
        return { path: data.temp_path, name: folderName };
      }

      function pickFolderNative() {
        return new Promise((resolve) => {
          const input = document.getElementById('folderInput');
          input.value = '';
          input.onchange = async () => {
            const files = Array.from(input.files);
            if (!files.length) return resolve(null);
            const folderName = files[0].webkitRelativePath.split('/')[0];
            const result = await uploadFolderFromFileList(files, folderName);
            resolve(result);
          };
          input.click();
        });
      }

      function pickZipNative() {
        return new Promise((resolve) => {
          const input = document.getElementById('zipFileInput');
          input.value = '';
          input.onchange = async () => {
            const file = input.files[0];
            if (!file) return resolve(null);
            const formData = new FormData();
            formData.append('file', file);
            const res = await apiCall('/api/upload-zip', 'POST', formData, false);
            const data = await res.json();
            resolve({ path: data.temp_path, name: file.name.replace('.zip','') });
          };
          input.click();
        });
      }

      // Drag & drop (robust)
      async function readDirectoryEntry(dirEntry) {
        const reader = dirEntry.createReader();
        const allEntries = [];
        const readBatch = () => new Promise((resolve, reject) => {
          reader.readEntries(entries => {
            if (entries.length) { allEntries.push(...entries); readBatch().then(resolve); }
            else resolve();
          }, reject);
        });
        await readBatch();
        return allEntries;
      }

      async function getAllFilesFromEntry(entry, basePath = '') {
        if (entry.isFile) {
          const file = await new Promise((res, rej) => entry.file(res, rej));
          Object.defineProperty(file, 'webkitRelativePath', { value: basePath + entry.name });
          return [file];
        } else if (entry.isDirectory) {
          const entries = await readDirectoryEntry(entry);
          const files = [];
          for (const e of entries) {
            const subFiles = await getAllFilesFromEntry(e, basePath + entry.name + '/');
            files.push(...subFiles);
          }
          return files;
        }
        return [];
      }

      async function handleDrop(items, isPorter = true) {
        const entries = [];
        for (const item of items) {
          if (item.kind === 'file') {
            if (item.getAsFileSystemHandle) {
              try {
                const handle = await item.getAsFileSystemHandle();
                if (handle.kind === 'directory') entries.push({ type: 'handle', handle });
              } catch (e) {}
            }
            if (entries.length === 0 && item.webkitGetAsEntry) {
              const entry = item.webkitGetAsEntry();
              if (entry && entry.isDirectory) entries.push({ type: 'entry', entry });
            }
          }
        }

        if (entries.length === 0) {
          alert('No folder detected. Please drop a folder.');
          return;
        }

        for (const e of entries) {
          let files, folderName;
          if (e.type === 'handle') {
            folderName = e.handle.name;
            files = [];
            async function traverse(handle, path = '') {
              for await (const [name, child] of handle.entries()) {
                if (child.kind === 'file') {
                  const file = await child.getFile();
                  Object.defineProperty(file, 'webkitRelativePath', { value: path + name });
                  files.push(file);
                } else if (child.kind === 'directory') {
                  await traverse(child, path + name + '/');
                }
              }
            }
            await traverse(e.handle);
          } else {
            folderName = e.entry.name;
            files = await getAllFilesFromEntry(e.entry);
          }

          if (files.length === 0) continue;

          const result = await uploadFolderFromFileList(files, folderName);
          if (result) {
            if (isPorter) {
              porterFolderPath = result.path;
              updatePorterPreview(result.path);
              document.getElementById('porterLog').innerText = `folder dropped: ${result.name}`;
            } else {
              const res = await apiCall('/api/install', 'POST', { source_path: result.path, is_zip: false, name: result.name });
              if (res.ok) await refreshInstalled();
            }
          }
        }
      }

      // Porter actions
      async function selectPorterFolder() {
        const result = await pickFolderNative();
        if (result) {
          porterFolderPath = result.path;
          updatePorterPreview(result.path);
          document.getElementById('porterLog').innerText = `selected: ${result.name}`;
        }
      }

      function clearPorter() {
        porterFolderPath = null;
        updatePorterPreview(null);
        document.getElementById('porterLog').innerText = 'ready. select a folder.';
      }

      async function runPorter() {
        if (!porterFolderPath) return alert('select a folder');
        const log = document.getElementById('porterLog');
        const prog = document.getElementById('porterProgressBar');
        const fill = document.getElementById('porterProgressFill');
        const manifest = document.getElementById('manifestSelect').value;

        log.innerText = 'running porter...\n';
        prog.classList.remove('hidden');
        fill.style.width = '0%';
        let p = 0;
        const int = setInterval(() => { p+=7; if(p<=90) fill.style.width = p+'%'; }, 100);
        try {
          const response = await fetch(API_BASE + '/api/porter', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ folder: porterFolderPath, manifest_choice: manifest })
          });
          clearInterval(int);
          fill.style.width = '100%';

          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'Porter failed');
          }

          const uuid = response.headers.get('X-Pack-UUID') || 'unknown';
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${porterFolderPath.split(/[\\\/]/).pop()}_encrypted.zip`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);

          log.innerText += `✅ porter done!\nuuid: ${uuid}\n📥 download started.`;
        } catch (e) {
          clearInterval(int);
          log.innerText += `❌ ${e.message || e}`;
        } finally {
          setTimeout(() => prog.classList.add('hidden'), 700);
        }
      }

      // Installed actions
      async function importPack() {
        const isZip = confirm('OK for ZIP, Cancel for Folder');
        let result;
        if (isZip) result = await pickZipNative();
        else result = await pickFolderNative();
        if (!result) return;
        const res = await apiCall('/api/install', 'POST', { source_path: result.path, is_zip: isZip, name: result.name });
        if (res.ok) refreshInstalled();
      }

      async function deleteSelected() {
        if (!selectedPackUuid) return alert('select a pack');
        if (!confirm('delete?')) return;
        await apiCall('/api/delete', 'POST', { uuid: selectedPackUuid });
        refreshInstalled();
      }

      async function safeWipe() {
        if (!confirm('delete ALL packs?')) return;
        await apiCall('/api/wipe', 'POST');
        refreshInstalled();
      }

      // Init
      async function populateManifests() {
        const res = await fetch(API_BASE + '/api/manifest-options');
        const opts = await res.json();
        const sel = document.getElementById('manifestSelect');
        opts.forEach(o => sel.add(new Option(o, o)));
      }

      function setupTabs() {
        document.querySelectorAll('.tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${tab.dataset.tab}`).classList.remove('hidden');
          });
        });
      }

      function setupDragDrop() {
        const pdz = document.getElementById('porterDropzone');
        pdz.addEventListener('dragover', e => { e.preventDefault(); pdz.classList.add('drag-over'); });
        pdz.addEventListener('dragleave', () => pdz.classList.remove('drag-over'));
        pdz.addEventListener('drop', async e => {
          e.preventDefault(); pdz.classList.remove('drag-over');
          await handleDrop(e.dataTransfer.items, true);
        });

        const idz = document.getElementById('importDropzone');
        idz.addEventListener('dragover', e => { e.preventDefault(); idz.classList.add('drag-over'); });
        idz.addEventListener('dragleave', () => idz.classList.remove('drag-over'));
        idz.addEventListener('drop', async e => {
          e.preventDefault(); idz.classList.remove('drag-over');
          await handleDrop(e.dataTransfer.items, false);
        });
      }

      document.addEventListener('DOMContentLoaded', async () => {
        setupTabs();
        setupDragDrop();
        await populateManifests();
        await refreshInstalled();

        document.getElementById('muteToggle').addEventListener('click', toggleMusic);
        document.getElementById('openOutputFolderBtn').addEventListener('click', () => fetch(API_BASE+'/api/open-folder'));
        document.getElementById('creditsBtn').addEventListener('click', ()=>alert('Zankur0 · macOS Skin Pack Porter\nby TrxpVoidz'));
        document.getElementById('selectPorterFolderBtn').addEventListener('click', selectPorterFolder);
        document.getElementById('clearPorterBtn').addEventListener('click', clearPorter);
        document.getElementById('runPorterBtn').addEventListener('click', runPorter);
        document.getElementById('refreshInstalledBtn').addEventListener('click', refreshInstalled);
        document.getElementById('deleteSelectedBtn').addEventListener('click', deleteSelected);
        document.getElementById('safeWipeBtn').addEventListener('click', safeWipe);
        document.getElementById('importDropzone').addEventListener('click', importPack);
      });
    })();
  </script>
</body>
</html>
